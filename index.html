<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fauzan Rahman</title>
    <link rel="icon" type="image/png" href="assets/logo/anne-headshot.png">
    <link rel="apple-touch-icon" href="assets/logo/anne-headshot.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>
      :root {
        --ink: #050505;
        --paper: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background: var(--paper);
        font-family: "Cormorant Garamond", serif;
      }

      a,
      a:visited {
        color: inherit;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      .business-card {
        display: block;
        width: clamp(300px, 90vw, 720px);
        height: auto;
        color: var(--ink);
        overflow: visible;
      }

      .business-card text,
      .business-card tspan {
        fill: currentColor;
        font-family: "Cormorant Garamond", serif;
        font-style: normal;
        dominant-baseline: hanging;
      }

      .small-caps {
        font-variant-caps: small-caps;
        letter-spacing: 0.02em;
      }

      .business-card a:hover text,
      .business-card a:focus-visible text,
      .business-card a:hover tspan,
      .business-card a:focus-visible tspan {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main aria-label="Fauzan Rahman Business Card">
      <svg class="business-card" viewBox="0 0 720 411" role="img" aria-labelledby="card-title card-description">
        <title id="card-title"></title>
        <desc id="card-description">Minimal business card for Fauzan Rahman.</desc>

        <line x1="0" y1="205.5" x2="720" y2="205.5" stroke="#ff0000" stroke-width="1" stroke-dasharray="6 6" vector-effect="non-scaling-stroke" aria-hidden="true" /> -->

        <a href="tel:+18312205685" aria-label="Call Fauzan Rahman at (831)220-5685">
          <text x="28" y="20" font-size="26" font-weight="500">831 220 5685</text>
        </a>

        <a href="https://profiles.stanford.edu/fauzan-rahman" target="_blank" rel="noopener" aria-label="Open Fauzan Rahman's Stanford profile in a new tab">

        </a>
        <a href="mailto:fauzan@stanford.edu" aria-label="Email Fauzan Rahman at fauzan@stanford.edu">
          <text x="360" y="212" font-size="24" font-weight="400" text-anchor="middle">fauzan@stanford.edu</text>

    </main>
  </body>
